# Production infrastructure (PostgreSQL, Redis, MinIO)
# NestJS server runs via PM2 on the host
# Usage: docker-compose -f docker-compose.prod.yml --env-file .env.production up -d

services:
  redis:
    image: redis:alpine
    container_name: sports-shop-redis
    restart: always
    ports:
      - '127.0.0.1:6379:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:

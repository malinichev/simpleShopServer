services:
  postgres:
    image: postgres:16
    container_name: sports-shop-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: sports-shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sports-shop-network

  redis:
    image: redis:alpine
    container_name: sports-shop-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - sports-shop-network

  minio:
    image: minio/minio
    container_name: sports-shop-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - sports-shop-network

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/sports-shop --ignore-existing;
      /usr/bin/mc anonymous set public myminio/sports-shop;
      exit 0;
      "
    networks:
      - sports-shop-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  sports-shop-network:
    driver: bridge
